<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plug Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- 🔒 شاشة المصادقة -->
    <div id="auth-screen" class="card">
        <h2>⚡ Plug Chat ⚡</h2>
        
        <input type="text" id="auth-username" placeholder="اسم المستخدم">
        <input type="password" id="auth-password" placeholder="كلمة السر">

        <div id="register-fields" class="hidden">
            <input type="number" id="auth-age" placeholder="العمر" value="20">
            <select id="auth-status">
                <option value="أعزب">أعزب</option>
                <option value="متزوج">متزوج</option>
                <option value="مخطوب">مخطوب</option>
            </select>
        </div>

        <button id="login-btn" onclick="handleAuth('login')">تسجيل الدخول</button>
        <button id="register-submit-btn" class="btn-alt hidden" onclick="handleAuth('register')">تأكيد إنشاء الحساب</button>
        
        <hr class="auth-divider">
        
        <button id="toggle-auth-btn" class="btn-secondary" onclick="toggleAuthMode()">إنشاء حساب جديد</button>
    </div>

    <!-- 🌐 واجهة التطبيق -->
    <div id="app-screen" class="hidden">
        
        <nav class="top-nav">
            <div class="logo">Plug Chat</div>
            <div class="nav-icons">
                <button onclick="switchTab('profile')" title="الملف الشخصي">👤</button>
                <button onclick="switchTab('friends')" title="الأصدقاء">👥 <span id="req-count"></span></button>
                <button onclick="switchTab('users')" title="المستخدمين">🌐</button>
                <button onclick="switchTab('chats')" title="الدردشات الخاصة">💬</button>
                <button onclick="switchTab('global')" title="الشات الجماعي">📢</button>
            </div>
        </nav>

        <main class="content">
            <!-- 👤 الملف الشخصي -->
            <section id="tab-profile" class="tab-page">
                <h3>الملف الشخصي</h3>
                <div class="profile-box card">
                    <img id="my-avatar" src="/aziz/profil.png" width="100" height="100" class="avatar-large">
                    <input type="file" id="avatar-input" onchange="uploadAvatar()">
                    <p>الاسم: <b id="my-username"></b></p>
                    <label>العمر: <input type="number" id="my-age"></label>
                    <label>الحالة الاجتماعية: 
                        <select id="my-status">
                            <option value="أعزب">أعزب</option>
                            <option value="متزوج">متزوج</option>
                            <option value="مخطوب">مخطوب</option>
                        </select>
                    </label>
                    <button onclick="saveProfile()" class="btn-alt">حفظ التغيرات</button>
                    <button onclick="logout()" class="btn-danger">تسجيل الخروج 🚪</button>
                </div>
            </section>

            <!-- 👥 الأصدقاء -->
            <section id="tab-friends" class="tab-page hidden">
                <h3>طلبات الصداقة</h3>
                <div id="requests-list"></div>
                <hr>
                <h3>قائمة الأصدقاء</h3>
                <div id="friends-list"></div>
            </section>

            <!-- 🌐 المستخدمين -->
            <section id="tab-users" class="tab-page hidden">
                <h3>جميع مستخدمي المنصة</h3>
                <div id="users-grid" class="grid"></div>
            </section>

            <!-- 💬 المحادثات الخاصة -->
            <section id="tab-chats" class="tab-page hidden">
                <div id="active-chats-list"></div>
                <div id="private-chat-window" class="chat-container hidden">
                    <div class="chat-header-title">
                        <span id="chat-with-name"></span>
                        <button onclick="startCall()" class="call-btn">📞 اتصال</button>
                    </div>
                    <div id="private-messages" class="messages-area"></div>
                    
                    <div class="chat-bar">
                        <div id="p-rec-timer" class="rec-timer hidden">🔴 <span id="p-timer-count">00:00</span></div>
                        <label class="icon-btn" title="إرفاق صورة أو فيديو">
                            📷
                            <input type="file" id="p-file-input" accept="image/*,video/*" onchange="sendPrivateMedia(this)" hidden>
                        </label>
                        <button class="icon-btn" id="p-mic-btn" onclick="toggleRecord('private')" title="تسجيل صوت">🎤</button>
                        <input type="text" id="p-msg-input" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') sendPrivateMsg()">
                        <button class="icon-btn like-btn" onclick="sendPrivateLike()" title="إرسال إعجاب">👍</button>
                        <button class="send-btn" onclick="sendPrivateMsg()">إرسال</button>
                    </div>
                </div>
            </section>

            <!-- 📢 الشات الجماعي -->
            <section id="tab-global" class="tab-page hidden">
                <div class="chat-container">
                    <div class="chat-header-title">💬 الشات الجماعي العام</div>
                    <div id="global-messages" class="messages-area"></div>
                    
                    <div class="chat-bar">
                        <div id="g-rec-timer" class="rec-timer hidden">🔴 <span id="g-timer-count">00:00</span></div>
                        <label class="icon-btn" title="إرفاق صورة أو فيديو">
                            📷
                            <input type="file" id="g-file-input" accept="image/*,video/*" onchange="sendGlobalMedia(this)" hidden>
                        </label>
                        <button class="icon-btn" id="g-mic-btn" onclick="toggleRecord('global')" title="تسجيل صوت">🎤</button>
                        <input type="text" id="g-msg-input" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') sendGlobalMsg()">
                        <button class="icon-btn like-btn" onclick="sendGlobalLike()" title="إرسال إعجاب">👍</button>
                        <button class="send-btn" onclick="sendGlobalMsg()">إرسال</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- نافذة التفاعلات والرد الخاطفة -->
    <div id="reaction-modal" class="modal hidden" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="reactions-bar">
                <span onclick="reactToMsg('❤️')">❤️</span>
                <span onclick="reactToMsg('😂')">😂</span>
                <span onclick="reactToMsg('👍')">👍</span>
                <span onclick="reactToMsg('😮')">😮</span>
                <span onclick="reactToMsg('😢')">😢</span>
                <span onclick="reactToMsg('😡')">😡</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
