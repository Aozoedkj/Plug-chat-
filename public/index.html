<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plug Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1️⃣ شاشة التسجيل والدخول -->
    <div id="auth-screen" class="auth-container">
        <h2>⚡ Plug Chat ⚡</h2>
        
        <div class="form-group">
            <input type="text" id="auth-username" placeholder="اسم المستخدم" required>
        </div>
        
        <div class="form-group">
            <input type="password" id="auth-password" placeholder="كلمة السر" required>
        </div>

        <div class="form-group">
            <input type="number" id="auth-age" placeholder="العمر (اختياري)" value="20">
        </div>

        <div class="form-group">
            <select id="auth-status">
                <option value="أعزب">أعزب</option>
                <option value="مرتبط">مرتبط</option>
                <option value="متزوج">متزوج</option>
            </select>
        </div>

        <div class="buttons-group">
            <button type="button" onclick="handleAuth('login')">تسجيل الدخول</button>
            <button type="button" onclick="handleAuth('register')">إنشاء حساب جديد</button>
        </div>
    </div>

    <!-- 2️⃣ الشاشة الرئيسية للتطبيق -->
    <div id="app-screen" class="app-container hidden">
        
        <nav class="nav-bar">
            <button class="nav-btn active" onclick="switchTab('global')">الدردشة العامة</button>
            <button class="nav-btn" onclick="switchTab('users')">المستخدمين</button>
            <button class="nav-btn" onclick="switchTab('friends')">الأصدقاء والطلبات</button>
            <button class="nav-btn" onclick="switchTab('chats')">الرسائل الخاصة</button>
        </nav>

        <!-- تبويب الدردشة العامة -->
        <div id="tab-global" class="tab-content">
            <h3>الدردشة العامة</h3>
            <div id="global-messages" class="messages-box"></div>
            <div class="input-box">
                <input type="text" id="global-input" placeholder="اكتب رسالة...">
                <button type="button" onclick="sendGlobalMessage()">إرسال</button>
            </div>
        </div>

        <!-- تبويب المستخدمين -->
        <div id="tab-users" class="tab-content hidden">
            <h3>جميع المستخدمين</h3>
            <div id="users-list-container" class="users-grid"></div>
        </div>

        <!-- تبويب الأصدقاء والطلبات -->
        <div id="tab-friends" class="tab-content hidden">
            <h3>طلبات الصداقة المعلقة</h3>
            <div id="friend-requests-container"></div>
            <hr>
            <h3>قائمة أصدقائي</h3>
            <div id="my-friends-container"></div>
        </div>

        <!-- تبويب المحادثات الخاصة -->
        <div id="tab-chats" class="tab-content hidden">
            <div id="chats-list-view">
                <h3>محادثاتي الخاصة</h3>
                <div id="chats-list-container"></div>
            </div>

            <div id="private-chat-window" class="hidden">
                <button type="button" onclick="closePrivateChatWindow()">← العودة للمحادثات</button>
                <h3 id="chat-with-name">محادثة مع...</h3>
                <div id="private-messages" class="messages-box"></div>
                <div class="input-box">
                    <input type="text" id="private-input" placeholder="اكتب رسالة خاصة...">
                    <button type="button" onclick="sendPrivateMessage()">إرسال</button>
                </div>
            </div>
        </div>

    </div>

    <!-- نافذة البروفايل المنبثقة -->
    <div id="user-profile-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="closeProfileModal()">&times;</span>
            <img id="view-user-avatar" src="" alt="Avatar" class="profile-avatar">
            <h3 id="view-user-name"></h3>
            <p id="view-user-details"></p>
            <button type="button" id="view-user-add-friend-btn">إرسال طلب صداقة</button>
            <button type="button" id="view-user-chat-btn">مراسلة خاصة</button>
        </div>
    </div>

    <!-- المكتبات للربط -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
